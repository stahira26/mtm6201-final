<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <!-- CONTACT PAGE -->
<div class="page" id="page-contact">
 
  <div class="contact-header">
    <h1>Get in Touch</h1>
  </div>
 
  <div class="contact-body">
    <div class="contact-form-card">
      <div class="form-group">
        <label>Name</label>
        <input type="text" placeholder="">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="">
      </div>
      <div class="form-group">
        <label>How can we help?</label>
        <textarea></textarea>
      </div>
    </div>
 
    <button class="btn send-btn">Send</button>
 
    <div class="contact-info" style="margin-top: 28px;">
      <div class="contact-info-item">
        <h3>Our Location</h3>
        <p>123 Greenway Rd, Cityville</p>
      </div>
      <div class="contact-info-item">
        <h3>Call Us</h3>
        <p>(123) 777-8431</p>
      </div>
      <div class="contact-info-item">
        <h3>Email Us</h3>
        <p>lovevegan@gmail.com</p>
      </div>
    </div>
 
    <div class="map-container">
      <iframe
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d179895.3!2d-75.9!3d45.35!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x4cce05b25f5113af%3A0x8a6a51e131dd15ed!2sOttawa%2C%20ON!5e0!3m2!1sen!2sca!4v1234567890"
        allowfullscreen
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"
        title="Love Vegan Location">
      </iframe>
    </div>
  </div>
  <footer>
    <span>Copyright ©</span>
    <div class="social-icons">
      <a href="#" class="fb"><svg viewBox="0 0 24 24"><path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/></svg></a>
      <a href="#" class="ig"><svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37z" fill="#fff"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg></a>

    </div>
  </footer>
</div>
</body>
</html>
