<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Love Vegan – Contact Us</title>
  <meta name="description" content="Get in touch with Love Vegan – location, phone, email and contact form." />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

  <a class="skip-link" href="#main-content">Skip to main content</a>

  <!-- NAVBAR -->
  <header>
    <nav class="navbar navbar-expand-lg" aria-label="Main navigation">
      <div class="container-fluid">
        <a class="navbar-brand" href="index.html" aria-label="Love Vegan – go to home page">
          <svg width="44" height="44" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Love Vegan logo">
            <rect width="60" height="60" fill="#2d3a1e" rx="4"/>
            <g transform="translate(30,28)">
              <path d="M0,-16 L9,-4 L16,4 L4,4 L0,14 L-4,4 L-16,4 L-9,-4 Z" fill="none" stroke="#8a9050" stroke-width="2"/>
              <path d="M0,-10 L5,-1 L10,4 L1,4 L0,10 L-1,4 L-10,4 L-5,-1 Z" fill="none" stroke="#c8b080" stroke-width="1.5"/>
              <circle cx="0" cy="0" r="3.5" fill="#8a9050"/>
              <line x1="-7" y1="-7" x2="7" y2="7" stroke="#c8b080" stroke-width="1"/>
              <line x1="7" y1="-7" x2="-7" y2="7" stroke="#c8b080" stroke-width="1"/>
            </g>
            <text x="30" y="56" text-anchor="middle" font-family="Raleway,sans-serif" font-size="7" font-weight="700" fill="#c8b080" letter-spacing="1.5">LOVE VEGAN</text>
          </svg>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
                aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation menu">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
            <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
            <li class="nav-item"><a class="nav-link active" aria-current="page" href="contact.html">Contact Us</a></li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <!-- MAIN -->
  <main id="main-content">

    <!-- Header -->
    <section class="contact-header" aria-labelledby="contact-heading">
      <h1 class="contact-title" id="contact-heading">Get in Touch</h1>
    </section>

    <!-- Contact Body -->
    <section class="contact-section" aria-label="Contact form and information">
      <div class="container-fluid px-3 px-md-4">

        <!-- Form card -->
        <div class="contact-form-card mb-4">
          <form novalidate aria-label="Contact form">
            <div class="mb-3">
              <label for="c-name" class="form-label">Name</label>
              <input type="text" class="form-control" id="c-name" name="name"
                     autocomplete="name" required aria-required="true" />
            </div>
            <div class="mb-3">
              <label for="c-email" class="form-label">Email</label>
              <input type="email" class="form-control" id="c-email" name="email"
                     autocomplete="email" required aria-required="true" />
            </div>
            <div class="mb-3">
              <label for="c-msg" class="form-label">How can we help?</label>
              <textarea class="form-control" id="c-msg" name="message" rows="6"
                        required aria-required="true"></textarea>
            </div>
          </form>
        </div>

        <!-- Send button (outside card, as in mockup) -->
        <div class="mb-4">
          <button type="submit" class="btn btn-send">Send</button>
        </div>

        <!-- Contact info -->
        <div class="mb-4" aria-label="Contact information">

          <div class="mb-3">
            <p class="contact-info-title mb-0">Our Location</p>
            <p class="contact-info-text">123 Greenway&nbsp; Rd, Cityville</p>
          </div>

          <div class="mb-3">
            <p class="contact-info-title mb-0">Call Us</p>
            <p class="contact-info-text">
              <a href="tel:+11237778431" style="color:var(--lv-cream);">(123) 777-8431</a>
            </p>
          </div>

          <div class="mb-3">
            <p class="contact-info-title mb-0">Email Us</p>
            <p class="contact-info-text">
              <a href="mailto:lovevegan@gmail.com" style="color:var(--lv-cream);">lovevegan@gmail.com</a>
            </p>
          </div>

        </div>

        <!-- Map -->
        <div class="map-wrap" aria-label="Map showing Love Vegan location">
          <iframe
            title="Love Vegan location map"
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d179895.3!2d-75.9!3d45.35!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x4cce05b25f5113af%3A0x8a6a51e131dd15ed!2sOttawa%2C%20ON!5e0!3m2!1sen!2sca!4v1234567890"
            allowfullscreen
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade">
          </iframe>
        </div>

      </div>
    </section>

  </main>

  <!-- FOOTER -->
  <footer class="site-footer d-flex align-items-center justify-content-between" role="contentinfo">
    <small class="footer-copy">Copyright &copy; 2025 Love Vegan</small>
    <div class="d-flex gap-2" aria-label="Social media links">
      <a href="#" class="social-link social-fb" aria-label="Facebook"><svg viewBox="0 0 24 24"><path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/></svg></a>
      <a href="#" class="social-link social-ig" aria-label="Instagram"><svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37z" fill="#fff"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg></a>
      <a href="#" class="social-link social-tk" aria-label="TikTok"><svg viewBox="0 0 24 24"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.19 8.19 0 004.78 1.52V6.76a4.85 4.85 0 01-1.01-.07z" fill="white"/></svg></a>
    </div>
  </footer>

  <div id="zoom-overlay" role="dialog" aria-modal="true" aria-label="Image zoom" onclick="closeZoom()">
    <button class="zoom-close" onclick="closeZoom()" aria-label="Close zoom">&#10005;</button>
    <img id="zoom-img" src="" alt="" />
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmcjQJe4wuBnUKXxaOhZTYeZb3k" crossorigin="anonymous"></script>
  <script src="js/main.js"></script>
</body>
</html>
